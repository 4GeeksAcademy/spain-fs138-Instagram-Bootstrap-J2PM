<!--Proyecto 2 - bootstrap-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/072e5df971.js" crossorigin="anonymous"></script>

    <title>My Instagram Feed</title>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fa-brands fa-instagram"></i>My Instagram Feed</a>
            <!-- Le estoy diciendo al boton que colapse con el Menu  -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="menu">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalPublicacion">
                    Crear publicación
                </button>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <!-- Uso un ul para crear el menu desplegable, cada li es un item del menu, y cada a es un link dentro del item del menu -->
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Mi Perfil</a></li>
                        <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <!-- Este es el menu de feed a grid -->
    <ul class="nav nav-pills justify-content-center my-3">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#cuadricula">
                <i class="fa-solid fa-table-cells"></i>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#lista">
                <i class="fa-solid fa-square"></i>
            </a>
        </li>
    </ul>
    <!-- Este es elcontenido de las imagenes -->
    <div class="tab-content">
        <div class="tab-pane fade show active" id="cuadricula">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://tse2.mm.bing.net/th/id/OIP.Myyz7aQk6tEnZb8jVA03AwHaEK?rs=1&pid=ImgDetMain&o=7&rm=3"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://statics.viralizalo.com/virs/2016/01/VIR_66821_5963_cuanto_sabes_de_las_islas_canarias.jpg?cb=74806"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://facts.net/wp-content/uploads/2023/07/31-facts-about-michael-jackson-1688465572.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://tiermaker.com/images/templates/personajes-random-15746187/157461871682367998.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://tse1.mm.bing.net/th/id/OIP.xSHJOVZPE3kqSY8HzXdm8AHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://newfordmodel.com/wp-content/uploads/2025/01/new-2026-ford-mustang-dark-horse-release-date.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://www.meganoticias.mx/uploads/noticias/cuerpo/estos-fueron-los-memes-mas-populares-del-2024-17353245745.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://tiermaker.com/images/templates/personajes-random-15746187/157461871682367998.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="ratio ratio-1x1">
                            <img src="https://newfordmodel.com/wp-content/uploads/2025/01/new-2026-ford-mustang-dark-horse-release-date.jpg"
                                class="img-fluid w-100 object-fit-cover" alt="descripcion">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="lista">
            <div class="row my-4">
                <div class="col-12 col-md-6 mx-auto border rounded">
                    <div class="d-flex p-2">
                        <span class="w-100 fs-4">Primera Publicación
                        </span>
                        <small class="text-muted">12/05</small>
                    </div>
                    <img src="https://newfordmodel.com/wp-content/uploads/2025/01/new-2026-ford-mustang-dark-horse-release-date.jpg"
                        class="w-100" alt="descripcion">
                    <div class="p-2">
                        <strong>1.234 Me gusta</strong>
                        <p>Primera publicación</p>
                    </div>
                </div>
            </div>
            <div class="row my-4">
                <div class="col-12 col-md-6 mx-auto border rounded">
                    <div class="d-flex p-2">
                        <span class="w-100 fs-4">Segunda Publicación</span>
                        <small class="text-muted">12/05</small>
                    </div>
                    <img src="https://facts.net/wp-content/uploads/2023/07/31-facts-about-michael-jackson-1688465572.jpg"
                        class="w-100" alt="descripcion">
                    <div class="p-2">
                        <strong>1.234 Me gusta</strong>
                        <p>Segunda publicación</p>
                    </div>
                </div>
            </div>
            <div class="row my-4">
                <div class="col-12 col-md-6 mx-auto border rounded">
                    <div class="d-flex p-2">
                        <span class="w-100 fs-4">Tercera Publicación</span>
                        <small class="text-muted">12/05</small>
                    </div>
                    <img src="https://tiermaker.com/images/templates/personajes-random-15746187/157461871682367998.jpg"
                        class="w-100" alt="descripcion">
                    <div class="p-2">
                        <strong>1.234 Me gusta</strong>
                        <p>Tercera publicación</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal de crear publicación -->
    <div class="modal fade" id="modalPublicacion">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva publicación</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea class="form-control" placeholder="Escribe algo..." rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success">Publicar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
